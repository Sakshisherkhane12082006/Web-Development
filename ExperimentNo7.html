<!DOCTYPE html>
<html>
<head>
    <title>Link Tag Demonstration</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
        }

        /* Top Header */
        .top-bar {
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
            color: white;
            text-align: center;
            padding: 12px;
            font-weight: bold;
        }

        h1 {
            text-align: center;
            margin: 20px;
        }

        .container {
            width: 85%;
            margin: auto;
        }

        /* Section Card */
        .section {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h3 {
            color: #ff7e5f;
        }

        /* Link Styling */
        a {
            text-decoration: none;
            color: white;
            background: #ff7e5f;
            padding: 8px 15px;
            border-radius: 6px;
            display: inline-block;
            margin-top: 5px;
        }

        a:hover {
            background: #e85a4f;
        }

        /* Image Styling */
        img {
            border-radius: 8px;
            margin-top: 10px;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.05);
        }

        #section2 {
            background: #fff3e6;
            padding: 15px;
            border-radius: 10px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<div class="top-bar">
    Name: Sakshi Manik Sherkhane | Roll No: 33
</div>

<h1>Demonstration of HTML Link Tags</h1>

<div class="container">

<div class="section">
<h3>1. External Link</h3>
<a href="https://www.google.com" target="_blank">Visit Google</a>
</div>

<div class="section">
<h3>2. Internal Link (Same Page)</h3>
<a href="#section2">Go to Section 2</a>
</div>

<div class="section">
<h3>3. Email Link</h3>
<a href="mailto:example@gmail.com">Send Email</a>
</div>

<div class="section">
<h3>4. Phone Link</h3>
<a href="tel:+911234567890">Call Us</a>
</div>

<div class="section">
<h3>5. Image Link (Local Image)</h3>
<a href="https://www.wikipedia.org" target="_blank">
    <img src="logo.png" width="120" alt="Wikipedia Logo">
</a>
</div>

<div class="section">
<h3>6. Image Link (Online Image)</h3>
<a href="https://www.wikipedia.org" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/63/Wikipedia-logo.png" width="120">
</a>
</div>



</div>

</body>
</html>
