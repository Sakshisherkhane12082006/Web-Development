<!DOCTYPE html>
<html>
<head>
    <title>Unique Frame Layout</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* Header */
        .header {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 12px;
        }

        /* Layout */
        .container {
            display: flex;
            height: 85vh;
        }

        /* Sidebar */
        .sidebar {
            width: 25%;
            background: #2c3e50;
            color: white;
            padding: 15px;
        }

        .sidebar h3 {
            text-align: center;
        }

        .sidebar button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .sidebar button:hover {
            background: #2980b9;
        }

        /* Content */
        .content {
            width: 75%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

<div class="header">
    <h3>Name: Sakshi Manik Sherkhane | Roll No: 33</h3>
    <h1>Unique Frame Layout</h1>
</div>

<div class="container">

    <!-- Sidebar Menu -->
    <div class="sidebar">
        <h3>Menu</h3>

        <button onclick="loadContent('home')">Home</button>
        <button onclick="loadContent('about')">About</button>
        <button onclick="loadContent('skills')">Skills</button>
        <button onclick="loadContent('contact')">Contact</button>
    </div>

    <!-- Content Frame -->
    <div class="content">
        <iframe id="frame"></iframe>
    </div>

</div>

<script>
function loadContent(page) {

    let data = "";

    if(page === "home") {
        data = "<h2>Welcome</h2><p>This is my unique frame layout project.</p>";
    }
    else if(page === "about") {
        data = "<h2>About Me</h2><p>I am Sakshi, learning Web Technology.</p>";
    }
    else if(page === "skills") {
        data = "<h2>Skills</h2><ul><li>HTML</li><li>CSS</li><li>Java</li></ul>";
    }
    else if(page === "contact") {
        data = "<h2>Contact</h2><p>Email: sakshi@example.com</p>";
    }

    document.getElementById("frame").srcdoc =
    "<html><body style='font-family:Arial;text-align:center;padding:20px;'>" 
    + data + 
    "</body></html>";
}
</script>

</body>
</html>
