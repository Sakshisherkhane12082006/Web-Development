<!DOCTYPE html>
<html>
<head>
    <title>Frame and Iframe Example</title>
</head>

<!-- Frameset divides page into 2 columns -->
<frameset cols="30%,70%">

    <!-- Left Frame -->
    <frame src="about:blank" name="leftFrame">

    <!-- Right Frame contains an HTML page with iframe -->
    <frame src="right.html">

</frameset>

</html>
